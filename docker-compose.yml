version: "3.9"

networks:
  marketsentinel-net:

volumes:
  redis-data:
  grafana-data:

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - marketsentinel-net

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5



  market-refresher:
    build:
      context: .
      dockerfile: docker/refresher.Dockerfile

    restart: unless-stopped
    networks:
      - marketsentinel-net

    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts

    depends_on:
      redis:
        condition: service_healthy



  api:
    build:
      context: .
      dockerfile: docker/inference.Dockerfile

    restart: unless-stopped
    networks:
      - marketsentinel-net

    ports:
      - "8000:8000"

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data

    environment:
      REDIS_HOST: redis

    depends_on:
      redis:
        condition: service_healthy



  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    networks:
      - marketsentinel-net

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    volumes:
      - ./app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

    depends_on:
      - api



  grafana:
    image: grafana/grafana
    restart: unless-stopped
    networks:
      - marketsentinel-net

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: strongpassword123

    depends_on:
      - prometheus
