version: "3.9"

networks:
  marketsentinel-net:
    driver: bridge

volumes:
  redis-data:
  grafana-data:
  prometheus-data:

services:

  ####################################################
  # REDIS (Optional Cache)
  ####################################################
  redis:
    container_name: marketsentinel-redis
    image: redis:7-alpine
    restart: unless-stopped

    networks:
      - marketsentinel-net

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    mem_limit: 256m
    cpus: 0.5


  ####################################################
  # API (Inference Engine)
  ####################################################
  api:
    container_name: marketsentinel-api

    build:
      context: .
      dockerfile: docker/inference.Dockerfile

    restart: unless-stopped

    networks:
      - marketsentinel-net

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - MARKET_MAX_WORKERS=2
      - YAHOO_MAX_CONCURRENT=1
      - DRIFT_HARD_FAIL=false

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data

    depends_on:
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

    mem_limit: 768m
    cpus: 1.0


  ####################################################
  # TRAINING (Manual Profile)
  ####################################################
  training:
    container_name: marketsentinel-training

    build:
      context: .
      dockerfile: docker/training.Dockerfile

    networks:
      - marketsentinel-net

    env_file:
      - .env

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data

    profiles:
      - training

    mem_limit: 2g
    cpus: 2.0


  ####################################################
  # PROMETHEUS
  ####################################################
  prometheus:
    container_name: marketsentinel-prometheus
    image: prom/prometheus

    restart: unless-stopped

    networks:
      - marketsentinel-net

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    volumes:
      - ./app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    ports:
      - "9090:9090"

    depends_on:
      - api

    mem_limit: 256m
    cpus: 0.5


  ####################################################
  # GRAFANA
  ####################################################
  grafana:
    container_name: marketsentinel-grafana
    image: grafana/grafana

    restart: unless-stopped

    networks:
      - marketsentinel-net

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    env_file:
      - .env

    depends_on:
      - prometheus

    mem_limit: 256m
    cpus: 0.5