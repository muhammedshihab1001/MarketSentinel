networks:
  marketsentinel-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  grafana-data:
  prometheus-data:

services:

  ####################################################
  # POSTGRESQL
  ####################################################
  postgres:
    container_name: marketsentinel-postgres
    image: postgres:16-alpine
    restart: unless-stopped

    networks:
      - marketsentinel-net

    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: marketsentinel

    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d marketsentinel"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

    mem_limit: 512m
    cpus: 1.0


  ####################################################
  # POSTGRESQL BACKUP (Daily — 7-day retention)
  ####################################################
  pg-backup:
    container_name: marketsentinel-backup
    image: postgres:16-alpine
    restart: unless-stopped

    networks:
      - marketsentinel-net

    volumes:
      - ./backups:/backups

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      PGPASSWORD: sentinel

    entrypoint: >
      sh -c "
        echo 'Backup service started. Running daily at midnight.';
        while true; do
          FILENAME=/backups/backup_$$(date +%Y%m%d_%H%M).sql;
          echo \"Starting backup: $$FILENAME\";
          pg_dump -U sentinel -h postgres marketsentinel > $$FILENAME;
          if [ $$? -eq 0 ]; then
            echo \"Backup successful: $$FILENAME\";
          else
            echo \"Backup FAILED\";
          fi;
          find /backups -name '*.sql' -mtime +7 -delete;
          echo 'Sleeping 24h until next backup...';
          sleep 86400;
        done
      "

    mem_limit: 128m
    cpus: 0.25


  ####################################################
  # REDIS
  ####################################################
  redis:
    container_name: marketsentinel-redis
    image: redis:7-alpine
    restart: unless-stopped

    command: redis-server --appendonly yes

    networks:
      - marketsentinel-net

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    mem_limit: 256m
    cpus: 0.5


  ####################################################
  # API (Inference Engine)
  ####################################################
  api:
    container_name: marketsentinel-api

    build:
      context: .
      dockerfile: docker/inference.Dockerfile

    restart: unless-stopped

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

    networks:
      - marketsentinel-net

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=marketsentinel
      - DATABASE_URL=postgresql+psycopg2://sentinel:sentinel@postgres:5432/marketsentinel
      - REDIS_HOST=redis
      - XGBOOST_NO_CUDA=1
      - PIPELINE_TOP_K=5
      - PIPELINE_BOTTOM_K=5
      - MARKET_MAX_WORKERS=8
      - DRIFT_HARD_FAIL=false
      # NOTE: CORS_ORIGINS intentionally omitted here.
      # It is read from .env via env_file above.
      # Hardcoding it here would override the .env value
      # and break production CORS silently.

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./logs:/app/logs

    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

    mem_limit: 1536m
    cpus: 1.0


  ####################################################
  # TRAINING
  # profiles:[training] prevents auto-start with
  # docker compose up -d. Run manually only:
  #   docker compose --profile training run --rm training
  ####################################################
  training:
    container_name: marketsentinel-training

    profiles:
      - training

    build:
      context: .
      dockerfile: docker/training.Dockerfile

    networks:
      - marketsentinel-net

    env_file:
      - .env

    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=marketsentinel
      - DATABASE_URL=postgresql+psycopg2://sentinel:sentinel@postgres:5432/marketsentinel
      - XGBOOST_NO_CUDA=1

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./logs:/app/logs

    depends_on:
      postgres:
        condition: service_healthy

    mem_limit: 2g
    cpus: 2.0


  ####################################################
  # PROMETHEUS
  ####################################################
  prometheus:
    container_name: marketsentinel-prometheus
    image: prom/prometheus:v2.53.0

    restart: unless-stopped

    networks:
      - marketsentinel-net

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    volumes:
      - ./app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    ports:
      - "9090:9090"

    mem_limit: 256m
    cpus: 0.5


  ####################################################
  # GRAFANA
  # Admin credentials read from .env with safe fallbacks.
  # Set GF_SECURITY_ADMIN_USER and GF_SECURITY_ADMIN_PASSWORD
  # in your .env file to override defaults.
  ####################################################
  grafana:
    container_name: marketsentinel-grafana
    image: grafana/grafana:11.1.0

    restart: unless-stopped

    networks:
      - marketsentinel-net

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}

    depends_on:
      - prometheus

    mem_limit: 256m
    cpus: 0.5