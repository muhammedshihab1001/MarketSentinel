version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: marketsentinel-redis
    expose:
      - "6379"
    restart: always


  market-refresher:
    build:
      context: .
      dockerfile: docker/refresher.Dockerfile   # create tiny image
    container_name: marketsentinel-refresher

    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts

    restart: always

    depends_on:
      - redis


  api:
    build:
      context: .
      dockerfile: docker/inference.Dockerfile

    container_name: marketsentinel-api

    ports:
      - "8000:8000"

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data

    depends_on:
      - redis

    restart: always

    environment:
      REDIS_HOST: redis


  prometheus:
    image: prom/prometheus
    container_name: prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    volumes:
      - ./app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

    depends_on:
      - api


  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus
