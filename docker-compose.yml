version: "3.9"

networks:
  marketsentinel-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  grafana-data:
  prometheus-data:

services:

  ####################################################
  # POSTGRESQL (Persistent Data Store)
  ####################################################
  postgres:
    container_name: marketsentinel-postgres
    image: postgres:16-alpine
    restart: unless-stopped

    networks:
      - marketsentinel-net

    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: marketsentinel

    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d marketsentinel"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

    mem_limit: 512m
    cpus: 1.0


  ####################################################
  # REDIS (Optional Cache)
  ####################################################
  redis:
    container_name: marketsentinel-redis
    image: redis:7-alpine
    restart: unless-stopped

    command: redis-server --appendonly yes

    networks:
      - marketsentinel-net

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    mem_limit: 256m
    cpus: 0.5


  ####################################################
  # API (Inference Engine)
  ####################################################
  api:
    container_name: marketsentinel-api

    build:
      context: .
      dockerfile: docker/inference.Dockerfile

    restart: unless-stopped

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

    networks:
      - marketsentinel-net

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - MARKET_MAX_WORKERS=2
      - YAHOO_MAX_CONCURRENT=1
      - DRIFT_HARD_FAIL=false
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=marketsentinel
      - REDIS_HOST=redis

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./logs:/app/logs

    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

    mem_limit: 768m
    cpus: 1.0


  ####################################################
  # TRAINING (Manual Profile)
  ####################################################
  training:
    container_name: marketsentinel-training

    build:
      context: .
      dockerfile: docker/training.Dockerfile

    networks:
      - marketsentinel-net

    env_file:
      - .env

    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=marketsentinel

    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./logs:/app/logs

    depends_on:
      postgres:
        condition: service_healthy

    profiles:
      - training

    mem_limit: 2g
    cpus: 2.0


  ####################################################
  # PROMETHEUS
  ####################################################
  prometheus:
    container_name: marketsentinel-prometheus
    image: prom/prometheus

    restart: unless-stopped

    networks:
      - marketsentinel-net

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    volumes:
      - ./app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    ports:
      - "9090:9090"

    mem_limit: 256m
    cpus: 0.5


  ####################################################
  # GRAFANA
  ####################################################
  grafana:
    container_name: marketsentinel-grafana
    image: grafana/grafana

    restart: unless-stopped

    networks:
      - marketsentinel-net

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

    depends_on:
      - prometheus

    mem_limit: 256m
    cpus: 0.5