name: MarketSentinel ML Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: marketsentinel-${{ github.ref }}
  cancel-in-progress: true


jobs:

# ===================================================
# TESTS + EVALUATION
# ===================================================

  fast-ci:
    name: Tests & Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          # CI-only dummy creds — not a secret, not reused anywhere
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: marketsentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # ── Thread / determinism ──────────────────────────────
      PYTHONHASHSEED: 42
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      TOKENIZERS_PARALLELISM: false
      PYTHONUNBUFFERED: 1

      # ── Database (CI dummy — not production) ─────────────
      # These match the postgres service above intentionally.
      # sentinel/sentinel is not a real credential — it only
      # works inside this ephemeral GitHub runner.
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: marketsentinel
      DATABASE_URL: postgresql+psycopg2://sentinel:sentinel@localhost:5432/marketsentinel

      # ── Auth — use GitHub Secrets ─────────────────────────
      # auth tests need a real JWT_SECRET to sign/verify tokens
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      OWNER_USERNAME: ${{ secrets.OWNER_USERNAME }}
      OWNER_PASSWORD_HASH: ${{ secrets.OWNER_PASSWORD_HASH }}

      # ── Redis — intentionally invalid ────────────────────
      # Cache layer fails open — no test should require Redis
      REDIS_HOST: invalid-host
      REDIS_PORT: 6379

      # ── Feature flags ─────────────────────────────────────
      # Never call Yahoo Finance, OpenAI, or news APIs in CI
      SKIP_DATA_SYNC: "1"
      STORE_PREDICTIONS: "0"
      LLM_ENABLED: "false"
      DRIFT_HARD_FAIL: "false"
      MODEL_STRICT_GOVERNANCE: "0"
      MODEL_ALLOW_POINTER_FALLBACK: "1"

      # ── Optional API keys (political risk fallback chain) ─
      # If secrets are set, fallback chain tests run fully.
      # If secrets are empty, GDELT is used (free, no key).
      # Tests never fail if these are absent.
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
      THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
      MEDIASTACK_KEY: ${{ secrets.MEDIASTACK_KEY }}
      CURRENTSAPI_KEY: ${{ secrets.CURRENTSAPI_KEY }}

      # ── Non-sensitive config from GitHub Variables ─────────
      APP_ENV: ${{ vars.APP_ENV || 'development' }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'WARNING' }}
      DEMO_REQUESTS_PER_FEATURE: ${{ vars.DEMO_REQUESTS_PER_FEATURE || '10' }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements/ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install --prefer-binary -r requirements/ci.txt

      - name: Run lint check (ruff)
        run: |
          pip install ruff
          ruff check . || true

      - name: Run flake8 — 85% pass threshold
        run: |
          pip install flake8

          cat > /tmp/.flake8ci << 'EOF'
          [flake8]
          max-line-length = 100
          extend-ignore = E501, W503, E203, E402
          exclude = .git,__pycache__,venv,.venv,migrations,artifacts,build,dist
          per-file-ignores =
              __init__.py: F401, F403
          EOF

          mapfile -t ALL_FILES < <(
            find app/ core/ training/ scripts/ tests/ \
              -name "*.py" \
              -not -path "*/__pycache__/*" \
              -not -path "*/artifacts/*" \
              -not -path "*/venv/*" \
              2>/dev/null | sort
          )

          TOTAL=${#ALL_FILES[@]}
          FAIL=0
          FAILED_LIST=()

          for f in "${ALL_FILES[@]}"; do
            OUT=$(flake8 "$f" --config=/tmp/.flake8ci 2>&1)
            if [ -n "$OUT" ]; then
              FAIL=$((FAIL+1))
              FAILED_LIST+=("$f")
              echo "$OUT"
            fi
          done

          PASS=$((TOTAL - FAIL))
          PCT=$(( (PASS * 100) / TOTAL ))

          echo "Flake8: $PASS/$TOTAL files clean ($PCT%) — required 85%"

          if [ "$PCT" -lt 85 ]; then
            echo "FAILED — fix violations in: ${FAILED_LIST[*]}"
            echo "Run locally: flake8 app/ core/ training/ --max-line-length=100"
            exit 1
          else
            echo "PASSED — $PCT% meets 85% threshold"
          fi

      - name: Run unit tests
        run: pytest tests -v --maxfail=1 --disable-warnings

      - name: Run model evaluation
        run: python -m training.run_evaluation


# ===================================================
# TRAINING SMOKE TEST
# ===================================================

  training-smoke:
    name: Training Smoke Test
    runs-on: ubuntu-latest
    needs: fast-ci
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: marketsentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      CI_SMOKE_TEST: "true"
      PYTHONHASHSEED: 42
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      PYTHONUNBUFFERED: 1

      # CI dummy database
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: msuser
      POSTGRES_PASSWORD: mspass123
      POSTGRES_DB: mstest
      DATABASE_URL: postgresql+psycopg2://msuser:mspass123@localhost:5432/mstest

      # Auth secrets needed if training pipeline validates ownership
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      OWNER_USERNAME: ${{ secrets.OWNER_USERNAME }}
      OWNER_PASSWORD_HASH: ${{ secrets.OWNER_PASSWORD_HASH }}

      REDIS_HOST: invalid-host
      SKIP_DATA_SYNC: "1"
      STORE_PREDICTIONS: "0"
      LLM_ENABLED: "false"
      DRIFT_HARD_FAIL: "false"
      MODEL_STRICT_GOVERNANCE: "0"

      APP_ENV: ${{ vars.APP_ENV || 'development' }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'WARNING' }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements/training.txt

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install --prefer-binary -r requirements/training.txt

      - name: Run Training Pipeline (Smoke)
        run: python -m training.pipelines.train_pipeline


# ===================================================
# DOCKER BUILD CHECK
# ===================================================

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: training-smoke
    timeout-minutes: 20

    steps:

      - uses: actions/checkout@v4

      - name: Enable BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Build inference image
        run: |
          docker build --pull \
            -f docker/inference.Dockerfile \
            -t marketsentinel-inference .

      - name: Build training image
        run: |
          docker build --pull \
            -f docker/training.Dockerfile \
            -t marketsentinel-training .