name: MarketSentinel ML Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Prevent wasted CI runs when pushing multiple commits
concurrency:
  group: marketsentinel-${{ github.ref }}
  cancel-in-progress: true


jobs:

# ===================================================
# FAST CI — Fail Early
# ===================================================

  fast-ci:
    name: Tests & Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # ⭐ Match Docker runtime
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Faster installs
      - name: Install dependencies
        run: |
          pip install --prefer-binary -r requirements/ci.txt

      - name: Run unit tests
        run: pytest tests -v

      # 🔥 Institutional Quality Gate
      - name: Run model evaluation
        run: python -m training.run_evaluation

      # VERY useful for debugging failures
      - name: Upload pytest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs
          path: .pytest_cache


# ===================================================
# TRAINING SMOKE TEST
# Prevents broken pipelines from merging
# ===================================================

  training-smoke:
    name: Training Smoke Test
    runs-on: ubuntu-latest
    needs: fast-ci
    timeout-minutes: 35

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install training dependencies
        run: |
          pip install --prefer-binary -r requirements/training.txt

      # ⭐ Prevent accidental GPU / huge runs
      - name: Run Training Orchestrator (Smoke Mode)
        env:
          CI_SMOKE_TEST: "true"
        run: |
          python -m training.pipelines.train_pipeline

      # Save artifacts if smoke fails
      - name: Upload training artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: artifacts/


# ===================================================
# DOCKER BUILD VALIDATION
# Guarantees deployability
# ===================================================

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: training-smoke
    timeout-minutes: 25

    steps:

      - uses: actions/checkout@v4

      # 🔥 Huge speed boost for Docker
      - name: Enable BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Build inference image
        run: |
          docker build \
            -f docker/inference.Dockerfile \
            -t marketsentinel-inference .

      - name: Build training image
        run: |
          docker build \
            -f docker/training.Dockerfile \
            -t marketsentinel-training .
