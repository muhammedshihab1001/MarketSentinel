name: MarketSentinel ML Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: marketsentinel-${{ github.ref }}
  cancel-in-progress: true


jobs:

# ===================================================
# JOB 1 — TESTS, LINT, EVALUATION
# ===================================================

  test-and-lint:
    name: Tests & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: marketsentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      PYTHONHASHSEED: 42
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      TOKENIZERS_PARALLELISM: false
      PYTHONUNBUFFERED: 1

      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: marketsentinel
      DATABASE_URL: postgresql+psycopg2://sentinel:sentinel@localhost:5432/marketsentinel

      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      OWNER_USERNAME: ${{ secrets.OWNER_USERNAME }}
      OWNER_PASSWORD_HASH: ${{ secrets.OWNER_PASSWORD_HASH }}

      REDIS_HOST: invalid-host
      REDIS_PORT: 6379

      SKIP_DATA_SYNC: "1"
      STORE_PREDICTIONS: "0"
      LLM_ENABLED: "false"
      DRIFT_HARD_FAIL: "false"
      MODEL_STRICT_GOVERNANCE: "0"
      MODEL_ALLOW_POINTER_FALLBACK: "1"
      CI: "true"

      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
      THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
      MEDIASTACK_KEY: ${{ secrets.MEDIASTACK_KEY }}
      CURRENTSAPI_KEY: ${{ secrets.CURRENTSAPI_KEY }}

      APP_ENV: ${{ vars.APP_ENV || 'development' }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'WARNING' }}
      DEMO_REQUESTS_PER_FEATURE: ${{ vars.DEMO_REQUESTS_PER_FEATURE || '10' }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements/ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install --prefer-binary -r requirements/ci.txt

      - name: Lint — flake8 (85% pass threshold)
        # FIX: Uses repo .flake8 config instead of inline config.
        # Local and CI linting rules are now identical.
        run: |
          pip install flake8

          mapfile -t ALL_FILES < <(
            find app/ core/ training/ scripts/ tests/ \
              -name "*.py" \
              -not -path "*/__pycache__/*" \
              -not -path "*/artifacts/*" \
              -not -path "*/venv/*" \
              2>/dev/null | sort
          )

          TOTAL=${#ALL_FILES[@]}
          FAIL=0
          FAILED_LIST=()

          for f in "${ALL_FILES[@]}"; do
            OUT=$(flake8 "$f" 2>&1)
            if [ -n "$OUT" ]; then
              FAIL=$((FAIL+1))
              FAILED_LIST+=("$f")
              echo "$OUT"
            fi
          done

          PASS=$((TOTAL - FAIL))
          PCT=$(( (PASS * 100) / TOTAL ))
          echo "Flake8: $PASS/$TOTAL files clean ($PCT%) — threshold 85%"

          if [ "$PCT" -lt 85 ]; then
            echo "FAILED: ${FAILED_LIST[*]}"
            exit 1
          else
            echo "PASSED — $PCT% meets threshold"
          fi

      - name: Tests — pytest
        run: pytest tests -v --maxfail=5 --disable-warnings -q


# ===================================================
# JOB 2 — DOCKER BUILD CHECK
# Runs only on main and develop pushes/PRs.
# ===================================================

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      github.base_ref == 'main' ||
      github.base_ref == 'develop'

    steps:

      - uses: actions/checkout@v4

      - name: Enable BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Build inference image
        run: |
          docker build --pull \
            -f docker/inference.Dockerfile \
            -t marketsentinel-inference:ci .

      - name: Build training image
        run: |
          docker build --pull \
            -f docker/training.Dockerfile \
            -t marketsentinel-training:ci .