name: MarketSentinel CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3️⃣ Install system dependencies (for xgboost, numpy)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      # 4️⃣ Install Python dependencies (CI only)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      # 5️⃣ Run unit tests
      - name: Run unit tests
        run: |
          pytest tests -v

      # 6️⃣ Run model evaluation (quality gate)
      - name: Run model evaluation
        run: |
          python -m training.run_evaluation
