name: MarketSentinel ML Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: marketsentinel-${{ github.ref }}
  cancel-in-progress: true


jobs:

# ===================================================
# TESTS + EVALUATION
# ===================================================

  fast-ci:
    name: Tests & Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONHASHSEED: 42
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      TOKENIZERS_PARALLELISM: false

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements/ci.txt

      - name: Run unit tests
        run: pytest tests -v

      - name: Run model evaluation
        run: python -m training.run_evaluation


# ===================================================
# TRAINING SMOKE TEST
# ===================================================

  training-smoke:
    name: Training Smoke Test
    runs-on: ubuntu-latest
    needs: fast-ci
    timeout-minutes: 30

    env:
      CI_SMOKE_TEST: "true"
      PYTHONHASHSEED: 42
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements/training.txt

      - name: Run Training Pipeline (Smoke)
        run: python -m training.pipelines.train_pipeline


# ===================================================
# DOCKER BUILD CHECK
# ===================================================

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: training-smoke
    timeout-minutes: 20

    steps:

      - uses: actions/checkout@v4

      - name: Enable BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Build inference image
        run: docker build -f docker/inference.Dockerfile -t marketsentinel-inference .

      - name: Build training image
        run: docker build -f docker/training.Dockerfile -t marketsentinel-training .