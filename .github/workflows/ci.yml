name: MarketSentinel ML Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: marketsentinel-${{ github.ref }}
  cancel-in-progress: true


jobs:

# ===================================================
# TESTS + EVALUATION
# ===================================================

  fast-ci:
    name: Tests & Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marketsentinel
          POSTGRES_PASSWORD: marketsentinel
          POSTGRES_DB: marketsentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      PYTHONHASHSEED: 42
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      TOKENIZERS_PARALLELISM: false
      PYTHONUNBUFFERED: 1
      # Database — points at the service above
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: marketsentinel
      POSTGRES_PASSWORD: marketsentinel
      POSTGRES_DB: marketsentinel
      DATABASE_URL: postgresql+psycopg2://marketsentinel:marketsentinel@localhost:5432/marketsentinel
      # Skip Yahoo sync in CI — no live data needed for unit tests
      SKIP_DATA_SYNC: "1"
      STORE_PREDICTIONS: "0"
      # Disable Redis / LLM / strict governance in CI
      REDIS_HOST: invalid-host
      LLM_ENABLED: "false"
      DRIFT_HARD_FAIL: "false"
      MODEL_STRICT_GOVERNANCE: "0"
      MODEL_ALLOW_POINTER_FALLBACK: "1"

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements/ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install --prefer-binary -r requirements/ci.txt

      - name: Run lint check
        run: |
          pip install ruff
          ruff check .

      - name: Run unit tests
        run: pytest tests -v --maxfail=1 --disable-warnings

      - name: Run model evaluation
        run: python -m training.run_evaluation


# ===================================================
# TRAINING SMOKE TEST
# ===================================================

  training-smoke:
    name: Training Smoke Test
    runs-on: ubuntu-latest
    needs: fast-ci
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marketsentinel
          POSTGRES_PASSWORD: marketsentinel
          POSTGRES_DB: marketsentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      CI_SMOKE_TEST: "true"
      PYTHONHASHSEED: 42
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: marketsentinel
      POSTGRES_PASSWORD: marketsentinel
      POSTGRES_DB: marketsentinel
      DATABASE_URL: postgresql+psycopg2://marketsentinel:marketsentinel@localhost:5432/marketsentinel
      SKIP_DATA_SYNC: "1"
      STORE_PREDICTIONS: "0"
      REDIS_HOST: invalid-host
      LLM_ENABLED: "false"
      DRIFT_HARD_FAIL: "false"
      MODEL_STRICT_GOVERNANCE: "0"

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements/training.txt

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install --prefer-binary -r requirements/training.txt

      - name: Run Training Pipeline (Smoke)
        run: python -m training.pipelines.train_pipeline


# ===================================================
# DOCKER BUILD CHECK
# ===================================================

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: training-smoke
    timeout-minutes: 20

    steps:

      - uses: actions/checkout@v4

      - name: Enable BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Build inference image
        run: |
          docker build --pull \
            -f docker/inference.Dockerfile \
            -t marketsentinel-inference .

      - name: Build training image
        run: |
          docker build --pull \
            -f docker/training.Dockerfile \
            -t marketsentinel-training .