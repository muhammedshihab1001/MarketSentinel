# =========================================================
# Prometheus scrape config for MarketSentinel
# Place at: app/monitoring/prometheus.yml
#
# Usage with Docker Compose:
#   prometheus:
#     image: prom/prometheus
#     volumes:
#       - ./app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
#     ports:
#       - "9090:9090"
# =========================================================

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    project: marketsentinel
    env: production

scrape_configs:
  - job_name: marketsentinel_api
    static_configs:
      - targets: ['inference:8000']
    metrics_path: /metrics
    scheme: http
    scrape_interval: 15s
    scrape_timeout: 10s