[pytest]
# =========================================================
# MarketSentinel — Pytest Configuration
# =========================================================

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode — required for FastAPI async route tests
asyncio_mode = auto

# Default timeout per test (seconds)
timeout = 60

# Coverage settings (used with pytest-cov)
addopts =
    --tb=short
    --strict-markers
    -q

# Custom markers
markers =
    slow: marks tests as slow running (deselect with -m 'not slow')
    integration: marks tests requiring live services (Redis, Postgres)
    unit: marks pure unit tests with no external dependencies

# Ignore directories
norecursedirs =
    .git
    .venv
    venv
    __pycache__
    node_modules
    artifacts
    data
    logs
    dist
    build
    *.egg-info

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning:xgboost
    ignore::UserWarning:yfinance